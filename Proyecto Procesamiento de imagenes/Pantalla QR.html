<!doctype html>
<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Escáner QR</title>
  <link rel="stylesheet" href="PantallaQR.css" />
</head>

<body>
  <main class="screen">
    <section class="content" aria-label="Pantalla Escáner QR">

                fill="#94A3B8"/>
        </svg>

      </div>

      <div class="actions">

      </div>

      <div class="spacer"></div>
    </section>
  </main>

</html>
