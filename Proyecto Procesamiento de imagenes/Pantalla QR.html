<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Escáner QR</title>

  <link rel="stylesheet" href="PantallaQR.css" />
  <link rel="stylesheet" href="Fondo.css" />
  <link rel="stylesheet" href="Formato.css" />
</head>

<body class="theme-monterrey page-qr">
  <main class="screen">
    <section class="content" aria-label="Pantalla Escáner QR">

      <div class="panel">
        <header class="panel__top">
          <div class="panel__brand">
            <span class="flag" aria-hidden="true">🇲🇽</span>
            <span>MUNDIAL FIFA 2026</span>
          </div>
          <div class="panel__sub">Experiencia México</div>
        </header>
        <div class="panel__inner">
          <div class="panel__bar" aria-label="Título sección">
            <span class="bar__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M9 7 10.2 5.5h3.6L15 7h2a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h2Z"
                      fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                <path d="M12 17a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"
                      fill="none" stroke="currentColor" stroke-width="1.6"/>
              </svg>
            </span>
            <span>Escáner QR</span>
          </div>

          <div class="scan-box" role="region" aria-label="Área de escaneo">
            <div class="scan-frame">
              <div class="scan-ball" aria-hidden="true">⚽</div>
              <div class="scan-pill">Coloca el código QR aquí</div>
            </div>
          </div>

          <ul class="tips" aria-label="Consejos">
            <li><span class="tip-ic" aria-hidden="true">📱</span> Centra el código en el marco</li>
            <li><span class="tip-ic" aria-hidden="true">💡</span> Buena iluminación requerida</li>
          </ul>

          <button class="action-btn" type="button">
            <span class="bolt" aria-hidden="true">⚡</span>
            Escanear Código
          </button>
        </div>
      </div>

    </section>
  </main>
</body>
</html>
